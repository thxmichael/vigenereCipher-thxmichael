<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigenere Cipher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Vigenere Cipher</h1>
    </header>
    <main>
        <h3>Message to be encrypted</h3>
        <input type="text" id="p" maxlength="87" placeholder="Type...">
        <h3>Encryption key</h3>
        <input type="text" id="k" maxlength="87" placeholder="Type..."><br>
        <button id="encrypt">Encrypt</button>
        <h2 id="encryptedText"></h2>
        <h3>Message to be decrypted</h3>
        <input type="text" id="c" maxlength="87" placeholder="Type...">
        <h3>Decryption key</h3>
        <input type="text" id="k1" maxlength="87" placeholder="Type..."><br>
        <button id="decrypt">Decrypt</button>
        <div><h2 id="decryptedText"></h2>

    </main>

    <footer>
        <p>&copy; 2026 Código fonte de thxmichael</p>
    </footer>
    <script src="vigenere.js"></script>
</body>
</html>
