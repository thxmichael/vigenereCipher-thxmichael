<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigenere Cipher</title>
</head>
<body>
    <header>
        <h1>Vigenere Cipher</h1>
    </header>
    <main>
        <h3>Message to be encrypted</h3>
        <input type="text" id="p" placeholder="Type...">
        <br>
        <h3>Encryption key</h3>
        <input type="text" id="k" placeholder="Type...">
        <p></p>
        <button id="encrypt">Encrypt</button>
        <h3 id="encryptedText" class="results"></h3>
        <h3>Message to be decrypted</h3>
        <input type="text" id="c" placeholder="Type...">
        <br>
        <h3>Decryption key</h3>
        <input type="text" id="k1" placeholder="Type...">
        <p></p>
        <button id="decrypt">Decrypt</button>
        <h3 id="decryptedText" class="results"></h3>

    </main>


    <script src="vigenere.js"></script>
</body>
</html>
